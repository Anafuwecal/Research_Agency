    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>ResearchAgent — Autonomous AI Research Workspace</title>
    <meta name="description" content="Deploy advanced autonomous multi-agent systems to research, plan, aggregate, and generate structural intelligence reports." />
    <meta name="robots" content="index, follow" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="ResearchAgent — Autonomous AI Research Workspace" />
    <meta property="og:description" content="Deploy advanced autonomous multi-agent systems to execute deep intelligence mapping." />
    <meta property="og:site_name" content="ResearchAgent" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      body {
        margin: 0;
        background-color: #f8fafc; /* Matches your tailwind slate-50 workspace view background */
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      .app-preloader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #f8fafc;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      .loader-icon {
        width: 44px;
        height: 44px;
        color: #4f46e5; /* Matches your brand primary color */
        animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .loader-text {
        margin-top: 16px;
        font-size: 14px;
        font-weight: 500;
        color: #64748b; /* slate-500 */
        letter-spacing: -0.01em;
      }
      @keyframes pulse-ring {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: .4; transform: scale(0.96); }
      }
    </style>
  </head>
  
  <body class="antialiased text-slate-800">
    <div id="app">
      <div class="app-preloader">
        <svg class="loader-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
        <p class="loader-text">Initializing Agent Environment...</p>
      </div>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
